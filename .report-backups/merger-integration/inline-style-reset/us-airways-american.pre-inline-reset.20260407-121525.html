<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>US Airways / American | Historical Comparator Reports</title>
  <style id="force-comparator-style">
:root {
  --page-bg: #f6f7fb;
  --card-bg: #ffffff;
  --text: #111827;
  --muted: #5b6472;
  --rule: #dfe3ea;
  --accent: #17365d;
  --accent-soft: #eef4fb;
  --shadow: 0 10px 30px rgba(15, 23, 42, 0.08);
  --radius: 16px;
  --max: 960px;
}

* { box-sizing: border-box; }

html, body {
  margin: 0;
  padding: 0;
  background: var(--page-bg);
  color: var(--text);
  font-family: Georgia, "Times New Roman", serif;
  line-height: 1.72;
}

body.comparator-page {
  min-height: 100vh;
  padding: 2rem 1rem 4rem;
}

a {
  color: var(--accent);
  text-decoration: underline;
  text-underline-offset: 0.12em;
}

a:hover {
  text-decoration-thickness: 2px;
}

.comparator-shell {
  max-width: var(--max);
  margin: 0 auto;
}

.comparator-breadcrumbs {
  margin: 0 0 1rem;
  font-family: Arial, Helvetica, sans-serif;
  font-size: 0.95rem;
  color: var(--muted);
}

.comparator-breadcrumbs a {
  color: var(--muted);
  text-decoration: none;
}

.comparator-breadcrumbs a:hover {
  text-decoration: underline;
}

.comparator-card {
  background: var(--card-bg);
  border: 1px solid var(--rule);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  padding: 2rem;
}

.eyebrow {
  margin: 0 0 0.35rem;
  color: var(--muted);
  font-family: Arial, Helvetica, sans-serif;
  font-size: 0.92rem;
  letter-spacing: 0.08em;
  text-transform: uppercase;
}

.meta {
  color: var(--muted);
  font-family: Arial, Helvetica, sans-serif;
  font-size: 0.96rem;
}

h1, h2, h3, h4 {
  color: var(--accent);
  line-height: 1.2;
}

h1 {
  font-size: 2.2rem;
  margin: 0 0 0.65rem;
}

h2 {
  font-size: 1.45rem;
  margin: 2rem 0 0.75rem;
}

h3 {
  font-size: 1.15rem;
  margin: 1.4rem 0 0.45rem;
}

h4 {
  font-size: 1rem;
  margin: 1.15rem 0 0.35rem;
}

p {
  margin: 0 0 1rem;
}

ul, ol {
  margin: 0 0 1rem;
  padding-left: 1.35rem;
}

li {
  margin-bottom: 0.45rem;
}

blockquote {
  margin: 1rem 0;
  padding: 0.85rem 1rem;
  border-left: 4px solid var(--accent);
  background: var(--accent-soft);
}

table {
  width: 100%;
  border-collapse: collapse;
  margin: 1rem 0;
  display: block;
  overflow-x: auto;
}

th, td {
  border: 1px solid var(--rule);
  padding: 0.65rem 0.75rem;
  text-align: left;
  vertical-align: top;
}

th {
  background: #f3f6fb;
  color: var(--accent);
}

img {
  max-width: 100%;
  height: auto;
}

pre {
  white-space: pre-wrap;
  overflow-x: auto;
  background: #f8fafc;
  border: 1px solid var(--rule);
  border-radius: 12px;
  padding: 1rem;
}

hr {
  border: 0;
  border-top: 1px solid var(--rule);
  margin: 2rem 0;
}

@media (max-width: 720px) {
  body.comparator-page {
    padding: 1rem 0.85rem 3rem;
  }

  .comparator-card {
    padding: 1.25rem;
    border-radius: 12px;
  }

  h1 {
    font-size: 1.75rem;
  }
}

@media print {
  html, body {
    background: #ffffff;
    color: #000000;
    font-size: 11pt;
  }

  body.comparator-page {
    padding: 0;
  }

  .comparator-breadcrumbs {
    display: none;
  }

  .comparator-card {
    box-shadow: none;
    border: none;
    padding: 0;
  }

  a {
    color: #000000;
    text-decoration: none;
  }
}
</style>
</head>
<body class="comparator-page">
  <main class="comparator-shell">
    <nav class="comparator-breadcrumbs" aria-label="Breadcrumb">
      <a href="/reports/merger-integration/">Merger &amp; Integration</a>
      <span aria-hidden="true"> / </span>
      <a href="/reports/merger-integration/#historical-comparator-reports">Historical Comparator Reports</a>
    </nav>
    <article class="comparator-card">
<div class="comparator-content">
<p class="eyebrow">Historical Comparator Reports</p>
<h1>US Airways / American</h1>
<p class="meta"><strong>Status:</strong> Report in progress</p>
<p>Historical comparator on the East-West combined CWA-AFA agreement, APFA transition, and the road into the American-era JCBA.</p>
    </article>
  </main>
</body>
</html>
